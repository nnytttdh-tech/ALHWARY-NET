<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALHWARY NET VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ccc; font-family: 'Courier New', monospace; overflow: hidden; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .overlay { position: relative; z-index: 2; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; background: rgba(0, 0, 0, 0.5); }
        #loadingScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .bar { width: 80%; max-width: 400px; height: 10px; border: 1px solid #0f0; background: #000; margin-top: 20px; }
        .fill { width: 0%; height: 100%; background: #0f0; box-shadow: 0 0 15px #0f0; }
        .code-card { background: rgba(15, 15, 15, 0.9); border: 1px solid #333; border-top: 3px solid #f00; margin-bottom: 20px; padding: 20px; border-radius: 8px; width: 100%; max-width: 450px; }
        .btn { background: #f00; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .id-box { font-size: 28px; color: #f1c40f; border: 2px dashed #444; padding: 20px; margin: 20px 0; background: rgba(0,0,0,0.7); }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div id="loadingScreen">
    <div style="color:#0f0; font-weight:bold;">[!] DECRYPTING DATA...</div>
    <div class="bar"><div id="bar" class="fill"></div></div>
</div>
<div class="overlay">
    <div id="loginPage" style="text-align:center; margin-top:30%;">
        <h1 style="color:#f00; text-shadow: 0 0 10px #f00;">ALHWARY NET</h1>
        <div class="id-box" id="myID">------</div>
        <button class="btn" onclick="window.location.href='https://wa.me/201556853817?text=تفعيل_ID:'+document.getElementById('myID').innerText">تفعيل الحساب</button>
    </div>
    <div id="contentPage" style="display:none; width: 100%; text-align: center;">
        <h2 style="color:#f00; margin-bottom:20px;">SYSTEM_ONLINE</h2>
        <div id="codesContainer"></div>
    </div>
</div>
<script>
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = "16px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
            if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 35);

    let userID = localStorage.getItem('h_user_id') || Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('h_user_id', userID);
    document.getElementById('myID').innerText = userID;

    async function check() {
        try {
            const res = await fetch(`codes.json?v=${Date.now()}`);
            const data = await res.json();
            let ok = data.site_status === "open" || (data.active_users && data.active_users[userID] && new Date(data.active_users[userID]) > new Date());
            if (ok && document.getElementById('contentPage').style.display !== "block") {
                document.getElementById('loginPage').style.display = "none";
                document.getElementById('loadingScreen').style.display = "flex";
                let p = 0;
                const t = setInterval(() => {
                    p += 5; document.getElementById('bar').style.width = p + "%";
                    if (p >= 100) { clearInterval(t); document.getElementById('loadingScreen').style.display = "none"; document.getElementById('contentPage').style.display = "block"; render(data); }
                }, 50);
            }
        } catch(e) {}
    }
    function render(data) {
        let h = "";
        data.net_codes.forEach(item => {
            const code = atob(item.code);
            h += `<div class="code-card">
                <div style="display:flex; justify-content:space-between"><span>💳 CODE:</span> <span style="color:#fff">${code}</span></div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>📦 UNITS:</span> <span style="color:#0f0">${item.units}</span></div>
                <button class="btn" onclick="navigator.clipboard.writeText('${code}');alert('تم النسخ')">COPY</button>
            </div>`;
        });
        document.getElementById('codesContainer').innerHTML = h;
    }
    setInterval(check, 4000);
</script>
</body>
</html>
